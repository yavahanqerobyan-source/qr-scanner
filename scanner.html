<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Сканер</title>
  <script src="https://unpkg.com/@zxing/library@0.20.0"></script>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}.app{max-width:560px;margin:0 auto;padding:12px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.back{color:#93c5fd;text-decoration:none;font-size:14px}h1{font-size:20px;margin:8px 0 4px;line-height:1.2}.subtitle{color:#94a3b8;font-size:13px;line-height:1.35}.card{background:#111827;border:1px solid #1f2937;border-radius:20px;padding:14px;margin-bottom:12px;box-shadow:0 12px 30px rgba(0,0,0,.28)}.video-wrap{position:relative;width:100%;overflow:hidden;border-radius:20px;background:#000;border:1px solid #334155}video{width:100%;height:390px;display:block;object-fit:cover;background:#000}.aim{position:absolute;left:10%;right:10%;top:38%;height:92px;border:3px solid rgba(34,197,94,.95);border-radius:18px;box-shadow:0 0 0 9999px rgba(0,0,0,.28);pointer-events:none}.scan-line{position:absolute;left:12%;right:12%;top:50%;height:2px;background:rgba(34,197,94,.95);box-shadow:0 0 12px rgba(34,197,94,.9);pointer-events:none}button{width:100%;padding:15px 16px;border:0;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}.primary{background:#22c55e;color:#052e16}.danger{background:#ef4444;color:#fff}.secondary{background:#334155;color:#fff}.status{margin-top:10px;padding:12px;border-radius:14px;background:#020617;border:1px solid #334155;color:#cbd5e1;font-size:14px;min-height:44px;line-height:1.4}.ok{color:#86efac}.warn{color:#fbbf24}.bad{color:#fca5a5}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.info-box{background:#020617;border:1px solid #334155;border-radius:14px;padding:10px}.info-label{font-size:11px;color:#94a3b8;margin-bottom:4px}.info-value{font-size:14px;color:#fff;word-break:break-word}label{display:block;font-size:13px;color:#cbd5e1;margin:12px 0 6px}input,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #334155;background:#020617;color:#fff;font-size:16px;outline:none}textarea{min-height:70px;resize:vertical}.last-code{font-size:20px;font-weight:800;color:#86efac;word-break:break-all;margin-top:8px}.counter{font-size:32px;font-weight:800;color:#fff}.history{max-height:260px;overflow-y:auto;padding-right:2px}.history-row{padding:9px 0;border-bottom:1px solid #1f2937}.history-code{font-size:15px;font-weight:700;word-break:break-all}.history-meta{color:#94a3b8;font-size:12px;margin-top:3px;line-height:1.35}.small{color:#94a3b8;font-size:12px;line-height:1.4}@media(max-width:440px){video{height:340px}.info-grid{grid-template-columns:1fr}.app{padding:10px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar"><a href="./index.html" class="back">← Настройки</a><div class="small" id="secureStatus"></div></div>
    <div class="card">
      <h1>Сканер QR / штрихкодов</h1>
      <div class="subtitle">Наведи камеру на серийный номер. После звука код будет отправлен в Google Таблицу.</div>
      <div class="info-grid">
        <div class="info-box"><div class="info-label">Действие</div><div class="info-value" id="infoAction">—</div></div>
        <div class="info-box"><div class="info-label">Оператор</div><div class="info-value" id="infoOperator">—</div></div>
        <div class="info-box"><div class="info-label">Заказ</div><div class="info-value" id="infoOrder">—</div></div>
        <div class="info-box"><div class="info-label">Контейнер / машина</div><div class="info-value" id="infoContainer">—</div></div>
      </div>
    </div>
    <div class="card">
      <div class="video-wrap"><video id="video" muted playsinline></video><div class="aim"></div><div class="scan-line"></div></div>
      <button class="primary" onclick="startScanner()">Старт камеры</button>
      <button class="danger" onclick="stopScanner()">Остановить</button>
      <div class="status" id="status">Готов к запуску.</div>
    </div>
    <div class="card"><div class="info-label">Последний код</div><div class="last-code" id="lastCode">—</div><div style="margin-top:14px;"><div class="info-label">Сканов за эту сессию</div><div class="counter" id="scanCount">0</div></div></div>
    <div class="card"><label>Ручной ввод, если камера не читает код</label><input id="manualCode" placeholder="Введите серийный номер вручную" /><label>Комментарий к ручному вводу</label><textarea id="manualComment" placeholder="Необязательно"></textarea><button class="secondary" onclick="sendManual()">Добавить вручную</button></div>
    <div class="card"><button class="secondary" onclick="syncOfflineQueue()">Отправить отложенные сканы</button><div class="status" id="queueStatus">Очередь: 0</div></div>
    <div class="card"><div style="font-weight:700;margin-bottom:8px;">История текущей сессии</div><div class="history" id="history"></div></div>
  </div>
<script>
const DEFAULT_WEB_APP_URL='https://script.google.com/macros/s/AKfycbww06b1TRs1vu5hez58ehyXLZ_MZHwRFTlYLFTqDNPOT0Z5SmtTZK09r-Wpe4lNwkc/exec';
const DEFAULT_TOKEN='PW_SCAN_2026_8kR92xLq_4739_SERBOX';
const STORAGE_KEY='serial_scanner_settings_v1';const OFFLINE_QUEUE_KEY='serial_scanner_offline_queue_v1';let codeReader=null,scanLocked=false,started=false,settings={},sessionScans=new Set(),scanCount=0;
function $(id){return document.getElementById(id)}function setStatus(text,type){const el=$('status');el.textContent=text;el.className='status '+(type||'')}function setQueueStatus(text,type){const el=$('queueStatus');el.textContent=text;el.className='status '+(type||'')}
function loadSettings(){settings=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');settings.webAppUrl=settings.webAppUrl||DEFAULT_WEB_APP_URL;settings.token=settings.token||DEFAULT_TOKEN;settings.action=settings.action||'Приемка';settings.operator=settings.operator||'';settings.orderNo=settings.orderNo||'';settings.container=settings.container||'';settings.boxNo=settings.boxNo||'';settings.comment=settings.comment||'';$('infoAction').textContent=settings.action||'—';$('infoOperator').textContent=settings.operator||'—';$('infoOrder').textContent=settings.orderNo||'—';$('infoContainer').textContent=settings.container||'—';if(location.protocol==='https:'||location.hostname==='localhost'){$('secureStatus').textContent='HTTPS OK';$('secureStatus').className='small ok'}else{$('secureStatus').textContent='Нужен HTTPS';$('secureStatus').className='small bad'}updateQueueCounter()}
function createScanId(){return window.crypto&&crypto.randomUUID?crypto.randomUUID():'scan-'+Date.now()+'-'+Math.random().toString(16).slice(2)}function normalizeCode(code){return String(code||'').trim().replace(/\s+/g,'').replace(/[‐-‒–—―]/g,'-')}
function buildPayload(serial,format,comment,source){return{token:settings.token,action:settings.action,operator:settings.operator,orderNo:settings.orderNo,container:settings.container,boxNo:settings.boxNo,serial:normalizeCode(serial),format:format||'',comment:comment||settings.comment||'',source:source||'camera-scanner',userAgent:navigator.userAgent,scanId:createScanId()}}
async function startScanner(){try{if(started){setStatus('Камера уже запущена.','ok');return}if(!settings.webAppUrl){setStatus('Не указан Backend URL. Вернись в настройки.','bad');return}if(!settings.token){setStatus('Не указан Token. Вернись в настройки.','bad');return}if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setStatus('Браузер не поддерживает доступ к камере. Открой в Chrome или Safari.','bad');return}if(location.protocol!=='https:'&&location.hostname!=='localhost'){setStatus('Камера работает только через HTTPS.','bad');return}setStatus('Запрашиваю доступ к камере...','warn');codeReader=new ZXing.BrowserMultiFormatReader();const constraints={video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},audio:false};await codeReader.decodeFromConstraints(constraints,'video',async function(result,error){if(result&&!scanLocked){scanLocked=true;const serial=normalizeCode(result.getText());const format=result.getBarcodeFormat?String(result.getBarcodeFormat()):'';await handleScan(serial,format,'camera-scanner');setTimeout(function(){scanLocked=false},1400)}});started=true;setStatus('Камера запущена. Наведи на QR или штрихкод.','ok')}catch(err){console.error(err);let msg=String(err&&err.message?err.message:err);if(msg.includes('Permission denied')||msg.includes('NotAllowedError'))msg='Нет разрешения на камеру. Разреши камеру в настройках сайта.';if(msg.includes('NotFoundError')||msg.includes('Requested device not found'))msg='Камера не найдена. Открой в Chrome/Safari и проверь разрешение камеры.';setStatus('Ошибка камеры: '+msg,'bad')}}
function stopScanner(){try{if(codeReader){codeReader.reset();codeReader=null}const video=$('video');if(video&&video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null}started=false;setStatus('Сканер остановлен.','warn')}catch(err){setStatus('Ошибка остановки: '+err.message,'bad')}}
async function handleScan(serial,format,source){serial=normalizeCode(serial);if(!serial)return;if(sessionScans.has(serial)){beepDuplicate();vibrate([120,60,120]);addHistory(serial,'ДУБЛЬ В ЭТОЙ СЕССИИ',true);setStatus('Дубль в текущей сессии: '+serial,'warn');return}sessionScans.add(serial);$('lastCode').textContent=serial;scanCount++;$('scanCount').textContent=String(scanCount);beepOk();vibrate([80]);const payload=buildPayload(serial,format,'',source);const sent=await sendToGoogle(payload);if(sent){addHistory(serial,'Отправлен в таблицу',false);setStatus('Считан и отправлен: '+serial,'ok')}else{saveOffline(payload);addHistory(serial,'Нет связи — сохранен в очереди',false);setStatus('Нет связи. Код сохранен в очереди: '+serial,'warn')}updateQueueCounter()}
async function sendManual(){const input=$('manualCode');const comment=$('manualComment').value.trim();const serial=normalizeCode(input.value);if(!serial){setStatus('Введите серийный номер вручную.','warn');return}if(sessionScans.has(serial)){beepDuplicate();addHistory(serial,'ДУБЛЬ В ЭТОЙ СЕССИИ',true);setStatus('Дубль в текущей сессии: '+serial,'warn');return}sessionScans.add(serial);$('lastCode').textContent=serial;scanCount++;$('scanCount').textContent=String(scanCount);const payload=buildPayload(serial,'manual',comment,'manual-input');const sent=await sendToGoogle(payload);if(sent){beepOk();addHistory(serial,'Ручной ввод отправлен',false);setStatus('Ручной ввод отправлен: '+serial,'ok')}else{saveOffline(payload);addHistory(serial,'Ручной ввод сохранен в очереди',false);setStatus('Нет связи. Ручной ввод сохранен в очереди.','warn')}input.value='';$('manualComment').value='';updateQueueCounter()}
async function sendToGoogle(payload){try{await fetch(settings.webAppUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});return true}catch(err){console.error(err);return false}}function getOfflineQueue(){return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY)||'[]')}function saveOffline(payload){const q=getOfflineQueue();q.push(payload);localStorage.setItem(OFFLINE_QUEUE_KEY,JSON.stringify(q));updateQueueCounter()}function updateQueueCounter(){const q=getOfflineQueue();setQueueStatus('Очередь: '+q.length,q.length?'warn':'ok')}async function syncOfflineQueue(){const q=getOfflineQueue();if(!q.length){setQueueStatus('Очередь пустая.','ok');return}setQueueStatus('Отправляю очередь: '+q.length,'warn');const remaining=[];for(const payload of q){const sent=await sendToGoogle(payload);if(!sent)remaining.push(payload);await sleep(250)}localStorage.setItem(OFFLINE_QUEUE_KEY,JSON.stringify(remaining));setQueueStatus(remaining.length?'Не все отправлено. Осталось: '+remaining.length:'Очередь успешно отправлена.',remaining.length?'warn':'ok')}
function addHistory(serial,status,duplicate){const row=document.createElement('div');row.className='history-row';row.innerHTML=`<div class="history-code ${duplicate?'warn':'ok'}">${escapeHtml(serial)}</div><div class="history-meta">${escapeHtml(status)}<br>${escapeHtml(new Date().toLocaleString())}</div>`;$('history').prepend(row)}function beepOk(){beep(880,.08)}function beepDuplicate(){beep(220,.18)}function beep(freq,duration){try{const ctx=new(window.AudioContext||window.webkitAudioContext)(),osc=ctx.createOscillator(),gain=ctx.createGain();osc.connect(gain);gain.connect(ctx.destination);osc.frequency.value=freq;osc.type='sine';gain.gain.setValueAtTime(.12,ctx.currentTime);osc.start();setTimeout(()=>{osc.stop();ctx.close()},duration*1000)}catch(err){}}function vibrate(pattern){try{if(navigator.vibrate)navigator.vibrate(pattern)}catch(err){}}function sleep(ms){return new Promise(resolve=>setTimeout(resolve,ms))}function escapeHtml(str){return String(str||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}window.addEventListener('beforeunload',function(){stopScanner()});loadSettings();
</script>
</body>
</html>
