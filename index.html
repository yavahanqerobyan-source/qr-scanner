<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Сканер серийных номеров</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#fff}.app{max-width:560px;margin:0 auto;padding:16px}.header{margin-bottom:16px}h1{font-size:24px;margin:8px 0 6px;line-height:1.2}.subtitle{color:#94a3b8;font-size:14px;line-height:1.4}.card{background:#111827;border:1px solid #1f2937;border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 12px 30px rgba(0,0,0,.28)}label{display:block;font-size:13px;color:#cbd5e1;margin:12px 0 6px}input,select,textarea{width:100%;padding:14px;border-radius:14px;border:1px solid #334155;background:#020617;color:#fff;font-size:16px;outline:none}textarea{min-height:76px;resize:vertical}button{display:block;width:100%;text-align:center;padding:15px 16px;border:0;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:12px}.primary{background:#22c55e;color:#052e16}.secondary{background:#334155;color:#fff}.status{margin-top:12px;padding:12px;border-radius:14px;background:#020617;border:1px solid #334155;color:#cbd5e1;font-size:14px;min-height:44px;line-height:1.4}.small{color:#94a3b8;font-size:12px;line-height:1.4}.ok{color:#86efac}.warn{color:#fbbf24}@media(max-width:440px){h1{font-size:21px}.app{padding:12px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Сканер серийных номеров</h1>
      <div class="subtitle">Заполни данные партии, затем открой камеру и сканируй QR / штрихкоды с коробок.</div>
    </div>

    <div class="card">
      <label>Действие</label>
      <select id="action">
        <option value="Приемка">Приемка</option>
        <option value="Отгрузка">Отгрузка</option>
        <option value="Инвентаризация">Инвентаризация</option>
        <option value="Проверка">Проверка</option>
      </select>
      <label>Оператор</label><input id="operator" placeholder="Например: Иван / водитель / склад" />
      <label>Заказ / заявка</label><input id="orderNo" placeholder="Например: DO-12345 / заявка 18" />
      <label>Контейнер / машина</label><input id="container" placeholder="Например: ABCU1234567 / А123ВС" />
      <label>Коробка / место</label><input id="boxNo" placeholder="Например: коробка 1 / паллета 3" />
      <label>Комментарий</label><textarea id="comment" placeholder="Необязательно"></textarea>
    </div>

    <div class="card">
      <label>Backend Apps Script URL</label><input id="webAppUrl" />
      <label>Token</label><input id="token" />
      <div class="small">Эти поля можно не трогать, если ссылка и токен уже вставлены в код.</div>
      <button class="secondary" onclick="saveSettings()">Сохранить настройки</button>
      <button class="secondary" onclick="sendTest()">Тест записи в таблицу</button>
      <div class="status" id="status">Готово к настройке.</div>
    </div>

    <div class="card">
      <button class="primary" onclick="openScanner()">Открыть сканер</button>
      <div class="small" style="margin-top:10px;">Камеру лучше открывать в Chrome / Safari, не во встроенном браузере Telegram или WhatsApp.</div>
    </div>
  </div>

  <script>
    const DEFAULT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbww06b1TRs1vu5hez58ehyXLZ_MZHwRFTlYLFTqDNPOT0Z5SmtTZK09r-Wpe4lNwkc/exec';
    const DEFAULT_TOKEN = 'PW_SCAN_2026_8kR92xLq_4739_SERBOX';
    const STORAGE_KEY = 'serial_scanner_settings_v1';
    function $(id){return document.getElementById(id)}
    function setStatus(text,type){const el=$('status');el.textContent=text;el.className='status '+(type||'')}
    function loadSettings(){const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');$('action').value=saved.action||'Приемка';$('operator').value=saved.operator||'';$('orderNo').value=saved.orderNo||'';$('container').value=saved.container||'';$('boxNo').value=saved.boxNo||'';$('comment').value=saved.comment||'';$('webAppUrl').value=saved.webAppUrl||DEFAULT_WEB_APP_URL;$('token').value=saved.token||DEFAULT_TOKEN}
    function collectSettings(){return{action:$('action').value.trim(),operator:$('operator').value.trim(),orderNo:$('orderNo').value.trim(),container:$('container').value.trim(),boxNo:$('boxNo').value.trim(),comment:$('comment').value.trim(),webAppUrl:$('webAppUrl').value.trim(),token:$('token').value.trim()}}
    function saveSettings(){const settings=collectSettings();if(!settings.webAppUrl){setStatus('Укажи Backend Apps Script URL.','warn');return false}if(!settings.token){setStatus('Укажи Token.','warn');return false}localStorage.setItem(STORAGE_KEY,JSON.stringify(settings));setStatus('Настройки сохранены.','ok');return true}
    function openScanner(){if(!saveSettings())return;window.location.href='./scanner.html'}
    async function sendTest(){if(!saveSettings())return;const s=collectSettings();const payload={token:s.token,action:s.action,operator:s.operator,orderNo:s.orderNo,container:s.container,boxNo:s.boxNo,serial:'TEST-'+Date.now(),format:'manual-test',comment:'Тестовая запись из index.html',source:'index-test',userAgent:navigator.userAgent,scanId:(crypto.randomUUID?crypto.randomUUID():String(Date.now()))};try{await fetch(s.webAppUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});setStatus('Тест отправлен. Проверь лист "Сканы" в Google Таблице.','ok')}catch(err){setStatus('Ошибка отправки: '+err.message,'warn')}}
    loadSettings();
  </script>
</body>
</html>
